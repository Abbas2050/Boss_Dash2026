<!DOCTYPE html>
<html>
<head>
    <title>Position Match Table</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Consolas, monospace; background: #0d0d14; color: #c8c8d0; padding: 0; }

        .nav { display: flex; align-items: center; gap: 0; background: #1a1b26; border-bottom: 1px solid #292e42; padding: 0 20px; }
        .nav-brand { color: #7aa2f7; font-weight: 700; font-size: 15px; padding: 12px 16px 12px 0; text-decoration: none; border-right: 1px solid #292e42; margin-right: 4px; }
        .nav a { color: #565f89; text-decoration: none; padding: 12px 14px; font-size: 13px; font-weight: 500; transition: color 0.15s, background 0.15s; }
        .nav a:hover { color: #c0caf5; background: #24283b; }
        .nav a.active { color: #7aa2f7; border-bottom: 2px solid #7aa2f7; }

        .content { padding: 16px; }
        .header { display: flex; align-items: center; gap: 16px; margin-bottom: 12px; }
        .header h1 { font-size: 16px; color: #c0caf5; font-weight: 600; }
        .header .toolbar { display: flex; gap: 8px; }
        .toolbar button {
            background: #1a1b26; border: 1px solid #292e42; color: #7aa2f7; padding: 4px 10px;
            border-radius: 4px; cursor: pointer; font-size: 12px;
        }
        .toolbar button:hover { background: #1f2335; border-color: #7aa2f7; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-left: 8px; }
        .status-dot.connected { background: #9ece6a; }
        .status-dot.disconnected { background: #f7768e; }
        .status-text { font-size: 11px; color: #565f89; margin-left: 4px; }
        .last-update { font-size: 11px; color: #565f89; margin-left: auto; }

        table { border-collapse: collapse; width: 100%; font-size: 13px; }
        thead th {
            background: #13131d; color: #7aa2f7; font-weight: 600; font-size: 11px;
            text-transform: uppercase; letter-spacing: 0.5px;
            padding: 8px 10px; text-align: right; border-bottom: 1px solid #292e42;
            position: sticky; top: 0; z-index: 1;
        }
        thead th:first-child, thead th:nth-child(2) { text-align: left; }
        tbody tr { border-bottom: 1px solid #1a1b26; }
        tbody tr:hover { background: #1a1b2a; }
        tbody td { padding: 6px 10px; text-align: right; white-space: nowrap; }
        tbody td:first-child { text-align: left; color: #c0caf5; font-weight: 600; }
        tbody td:nth-child(2) { text-align: left; }

        tfoot td {
            padding: 8px 10px; text-align: right; font-weight: 700;
            border-top: 2px solid #292e42; background: #13131d;
        }
        tfoot td:first-child { text-align: left; color: #c0caf5; }
        tfoot td:nth-child(2) { text-align: left; }

        .val-pos { color: #9ece6a; }
        .val-neg { color: #f7768e; }
        .val-zero { color: #565f89; }
        .dir-buy { color: #9ece6a; font-weight: 600; font-size: 11px; }
        .dir-sell { color: #f7768e; font-weight: 600; font-size: 11px; }

        .pinned-row td { background: rgba(224, 175, 104, 0.05); }
        .pinned-row:hover td { background: rgba(224, 175, 104, 0.10); }
        .pinned-row td:first-child { border-left: 3px solid #e0af68; padding-left: 7px; }
        .gold-subtotal td { background: rgba(224, 175, 104, 0.15) !important; font-weight: 700; border-top: 1px solid rgba(224, 175, 104, 0.3); }
        .gold-subtotal td:first-child { color: #e0af68; border-left: 3px solid #e0af68; padding-left: 7px; }
        .pinned-divider { border-bottom: 2px solid rgba(224, 175, 104, 0.5) !important; }

        .cs-badge { font-size: 10px; color: #e0af68; background: rgba(224,175,104,0.15); padding: 1px 4px; border-radius: 3px; margin-left: 4px; font-weight: 600; }
        .loading { text-align: center; padding: 60px; color: #565f89; font-size: 14px; }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="/" class="nav-brand">SLC Dashboard</a>
        <a href="/">Home</a>
        <a href="/risk-exposure.html">Risk Exposure</a>
        <a href="/coverage.html" class="active">Coverage</a>
        <a href="/metrics.html">Metrics</a>
        <a href="/lp-manager.html">LP Manager</a>
        <a href="/lp-info.html">LP Info</a>
        <a href="/symbol-mapping.html">Symbol Mapping</a>
        <a href="/transactions.html">Transactions</a>
        <a href="/account-alerts.html">Account Alerts</a>
        <a href="/deal-matching.html">Deal Matching</a>
        <a href="/history.html">History</a>
        <a href="/swap-tracker.html">Swap Tracker</a>
        <a href="/clients-nop.html">Clients NOP</a>
        <a href="/nop-limits.html">NOP Limits</a>
        <a href="/contract-sizes.html">Contract Sizes</a>
        <a href="/ws-test.html">WS Test</a>
        <a href="/swagger">Swagger</a>
    </nav>

    <div class="content">
        <div class="header">
            <h1>Position Match Table</h1>
            <span class="status-dot disconnected" id="statusDot"></span>
            <span class="status-text" id="statusText">Connecting...</span>
            <div class="toolbar">
                <button onclick="refreshFromApi()">Refresh</button>
            </div>
            <span class="last-update" id="lastUpdate"></span>
        </div>

        <div id="tableContainer">
            <div class="loading">Connecting to server...</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <script>
        let connection = null;

        function isGoldSymbol(symbol) {
            const s = symbol.toUpperCase();
            // XAUUSD = spot, GOLDFT = aggregated futures (includes CME GC contracts)
            return s === 'XAUUSD' || s.startsWith('GOLD');
        }

        function formatVal(v) {
            if (v === 0) return '<span class="val-zero">0.00</span>';
            const cls = v > 0 ? 'val-pos' : 'val-neg';
            return `<span class="${cls}">${v.toFixed(2)}</span>`;
        }

        function renderTable(data) {
            if (!data || !data.rows || data.rows.length === 0) {
                document.getElementById('tableContainer').innerHTML =
                    '<div class="loading">No data available</div>';
                return;
            }

            const lpNames = data.lpNames || [];
            let html = '<table><thead><tr>';
            html += '<th>Symbol</th><th>Buy/Sell</th><th>Client Net</th><th>Uncovered</th>';
            lpNames.forEach(lp => { html += `<th>${lp}</th>`; });
            html += '</tr></thead><tbody>';

            // Filter out blank symbols, partition into gold (pinned) + rest
            const rows = data.rows.filter(r => r.symbol && r.symbol.trim());
            const gold = [...rows].filter(r => isGoldSymbol(r.symbol)).sort((a, b) => a.symbol.localeCompare(b.symbol));
            const rest = [...rows].filter(r => !isGoldSymbol(r.symbol)).sort((a, b) => a.symbol.localeCompare(b.symbol));
            const sorted = [...gold, ...rest];

            sorted.forEach((row, idx) => {
                const isGold = isGoldSymbol(row.symbol);
                html += `<tr class="${isGold ? 'pinned-row' : ''}">`;
                html += `<td>${row.symbol}</td>`;
                if (row.direction === 'BUY')
                    html += '<td><span class="dir-buy">BUY</span></td>';
                else if (row.direction === 'SELL')
                    html += '<td><span class="dir-sell">SELL</span></td>';
                else
                    html += '<td></td>';
                const csBadge = row.contractSizeMultiplier && row.contractSizeMultiplier !== 1 ? `<span class="cs-badge">x${row.contractSizeMultiplier}</span>` : '';
                html += `<td>${formatVal(row.clientNet)}${csBadge}</td>`;
                html += `<td>${formatVal(row.uncovered)}</td>`;
                lpNames.forEach(lp => {
                    const v = (row.lpNets && row.lpNets[lp]) || 0;
                    html += `<td>${formatVal(v)}</td>`;
                });
                html += '</tr>';

                // Gold subtotal row after last gold symbol
                if (isGold && idx === gold.length - 1 && gold.length > 0) {
                    const goldClientNet = gold.reduce((s, r) => s + r.clientNet, 0);
                    const goldUncovered = gold.reduce((s, r) => s + r.uncovered, 0);
                    html += '<tr class="gold-subtotal pinned-divider">';
                    html += '<td>GOLD TOTAL</td><td></td>';
                    html += `<td>${formatVal(goldClientNet)}</td>`;
                    html += `<td>${formatVal(goldUncovered)}</td>`;
                    lpNames.forEach(lp => {
                        const v = gold.reduce((s, r) => s + ((r.lpNets && r.lpNets[lp]) || 0), 0);
                        html += `<td>${formatVal(v)}</td>`;
                    });
                    html += '</tr>';
                }
            });

            html += '</tbody><tfoot><tr>';
            html += '<td>TOTAL</td><td></td>';
            html += `<td>${formatVal(data.totals.clientNet)}</td>`;
            html += `<td>${formatVal(data.totals.uncovered)}</td>`;
            lpNames.forEach(lp => {
                const v = (data.totals.lpNets && data.totals.lpNets[lp]) || 0;
                html += `<td>${formatVal(v)}</td>`;
            });
            html += '</tr></tfoot></table>';

            document.getElementById('tableContainer').innerHTML = html;
            document.getElementById('lastUpdate').textContent = 'Updated: ' + new Date().toLocaleTimeString();
        }

        async function refreshFromApi() {
            try {
                const resp = await fetch('/Coverage/position-match-table');
                const data = await resp.json();
                renderTable(data);
            } catch (e) {
                console.error('API fetch failed:', e);
            }
        }

        async function startSignalR() {
            connection = new signalR.HubConnectionBuilder()
                .withUrl('/ws/dashboard')
                .withAutomaticReconnect([0, 1000, 2000, 5000, 10000])
                .build();

            connection.on('PositionMatchTableUpdate', (data) => {
                renderTable(data);
            });

            connection.onreconnecting(() => {
                document.getElementById('statusDot').className = 'status-dot disconnected';
                document.getElementById('statusText').textContent = 'Reconnecting...';
            });

            connection.onreconnected(() => {
                document.getElementById('statusDot').className = 'status-dot connected';
                document.getElementById('statusText').textContent = 'Connected';
                refreshFromApi();
            });

            connection.onclose(() => {
                document.getElementById('statusDot').className = 'status-dot disconnected';
                document.getElementById('statusText').textContent = 'Disconnected';
            });

            try {
                await connection.start();
                document.getElementById('statusDot').className = 'status-dot connected';
                document.getElementById('statusText').textContent = 'Connected';
                await refreshFromApi();
            } catch (e) {
                document.getElementById('statusDot').className = 'status-dot disconnected';
                document.getElementById('statusText').textContent = 'Connection failed';
                document.getElementById('tableContainer').innerHTML =
                    '<div class="loading">Failed to connect. <button onclick="startSignalR()">Retry</button></div>';
            }
        }

        startSignalR();
    </script>
</body>
</html>
