<!DOCTYPE html>
<html>
<head>
    <title>SLC - Clients NOP Report</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', monospace; background: #0f0f1a; color: #e0e0e0; padding: 0; }

        .nav { display: flex; align-items: center; gap: 0; background: #1a1b26; border-bottom: 1px solid #292e42; padding: 0 20px; }
        .nav-brand { color: #7aa2f7; font-weight: 700; font-size: 15px; padding: 12px 16px 12px 0; text-decoration: none; border-right: 1px solid #292e42; margin-right: 4px; }
        .nav a { color: #565f89; text-decoration: none; padding: 12px 14px; font-size: 13px; font-weight: 500; transition: color 0.15s, background 0.15s; }
        .nav a:hover { color: #c0caf5; background: #24283b; }
        .nav a.active { color: #7aa2f7; border-bottom: 2px solid #7aa2f7; }

        .content { padding: 20px; }
        h1 { font-size: 18px; color: #7aa2f7; margin-bottom: 15px; }

        .controls { display: flex; gap: 12px; align-items: center; margin-bottom: 15px; flex-wrap: wrap; }
        .controls label { font-size: 13px; color: #888; }
        .controls select { background: #24283b; border: 1px solid #414868; color: #e0e0e0; padding: 6px 10px; border-radius: 4px; font-size: 13px; min-width: 160px; }

        button { background: #7aa2f7; color: #1a1b26; border: none; padding: 7px 16px; cursor: pointer; border-radius: 4px; font-size: 13px; font-weight: bold; }
        button:hover { background: #89b4fa; }

        .meta-bar { font-size: 12px; color: #565f89; margin-bottom: 15px; display: flex; gap: 20px; }
        .meta-bar span { color: #888; }

        .symbol-section { margin-bottom: 30px; }
        .symbol-header { font-size: 15px; font-weight: 700; color: #c0caf5; padding: 10px 12px; background: #1a1b26; border: 1px solid #292e42; border-radius: 6px 6px 0 0; display: flex; justify-content: space-between; align-items: center; }
        .symbol-header .net-label { font-size: 13px; font-weight: 600; }

        .side-header { padding: 6px 12px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 8px; }
        .side-header.buy { background: rgba(158, 206, 106, 0.1); color: #9ece6a; border-left: 3px solid #9ece6a; }
        .side-header.sell { background: rgba(247, 118, 142, 0.1); color: #f7768e; border-left: 3px solid #f7768e; }

        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: #24283b; color: #7aa2f7; padding: 6px 8px; text-align: right; font-weight: 600; white-space: nowrap; }
        th:first-child, th:nth-child(2) { text-align: left; }
        td { padding: 5px 8px; border-bottom: 1px solid #1f2335; text-align: right; white-space: nowrap; }
        td:first-child, td:nth-child(2) { text-align: left; }
        tr:hover td { background: #1f2335; }

        .total-row td { background: #24283b; font-weight: 700; border-top: 1px solid #414868; }

        .net-row { background: #1a1b26; border: 1px solid #292e42; border-top: none; border-radius: 0 0 6px 6px; padding: 8px 12px; font-size: 13px; font-weight: 700; display: flex; justify-content: space-between; }

        .positive { color: #9ece6a; }
        .negative { color: #f7768e; }
        .muted { color: #565f89; }

        .table-wrap { border: 1px solid #292e42; border-top: none; overflow-x: auto; }

        #msg { font-size: 13px; min-height: 20px; margin-bottom: 8px; }
        .msg-ok { color: #9ece6a; }
        .msg-err { color: #f7768e; }
        .loading { color: #565f89; font-style: italic; padding: 20px; text-align: center; }
        .over-limit td { background: rgba(247, 118, 142, 0.08); }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="/" class="nav-brand">SLC Dashboard</a>
        <a href="/">Home</a>
        <a href="/risk-exposure.html">Risk Exposure</a>
        <a href="/coverage.html">Coverage</a>
        <a href="/metrics.html">Metrics</a>
        <a href="/lp-manager.html">LP Manager</a>
        <a href="/lp-info.html">LP Info</a>
        <a href="/symbol-mapping.html">Symbol Mapping</a>
        <a href="/transactions.html">Transactions</a>
        <a href="/account-alerts.html">Account Alerts</a>
        <a href="/deal-matching.html">Deal Matching</a>
        <a href="/history.html">History</a>
        <a href="/swap-tracker.html">Swap Tracker</a>
        <a href="/clients-nop.html" class="active">Clients NOP</a>
        <a href="/nop-limits.html">NOP Limits</a>
        <a href="/ws-test.html">WS Test</a>
        <a href="/swagger">Swagger</a>
    </nav>

    <div class="content">
        <h1>Clients NOP Report</h1>

        <div class="controls">
            <label>Symbol:</label>
            <select id="symbolSelect">
                <option value="">All Symbols</option>
            </select>
            <button onclick="loadReport()">Load</button>
        </div>

        <div id="msg"></div>
        <div class="meta-bar" id="metaBar" style="display:none;">
            <span>Timestamp: <b id="metaTimestamp"></b></span>
            <span>Accounts: <b id="metaAccounts"></b></span>
            <span>Logins with positions: <b id="metaLogins"></b></span>
        </div>

        <div id="reportContainer"></div>
    </div>

<script>
    let allSymbols = [];

    function msg(text, isError) {
        const el = document.getElementById('msg');
        el.textContent = text;
        el.className = isError ? 'msg-err' : 'msg-ok';
    }

    function fmt(v, decimals = 2) {
        if (v == null || isNaN(v)) return '-';
        return v.toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
    }

    function colorVal(v, decimals = 2) {
        if (v == null || isNaN(v)) return '<span class="muted">-</span>';
        const cls = v > 0 ? 'positive' : v < 0 ? 'negative' : '';
        return `<span class="${cls}">${fmt(v, decimals)}</span>`;
    }

    function marginLevelFmt(v) {
        if (v == null || isNaN(v) || v === 0) return '<span class="muted">-</span>';
        const cls = v >= 200 ? 'positive' : v >= 100 ? '' : 'negative';
        return `<span class="${cls}">${fmt(v, 2)}%</span>`;
    }

    async function loadReport() {
        const symbol = document.getElementById('symbolSelect').value;
        const url = symbol ? `/NopReport?symbol=${encodeURIComponent(symbol)}` : '/NopReport';

        msg('Loading...');
        document.getElementById('reportContainer').innerHTML = '<div class="loading">Loading NOP data...</div>';

        try {
            const resp = await fetch(url);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const data = await resp.json();

            // Update meta bar
            document.getElementById('metaBar').style.display = 'flex';
            document.getElementById('metaTimestamp').textContent = data.timestamp;
            document.getElementById('metaAccounts').textContent = data.accountsReporting;
            document.getElementById('metaLogins').textContent = data.collectedLogins;

            // Populate symbol dropdown if first load
            if (allSymbols.length === 0 && data.symbols.length > 0) {
                allSymbols = data.symbols.map(s => s.symbol).sort();
                const sel = document.getElementById('symbolSelect');
                allSymbols.forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s;
                    opt.textContent = s;
                    sel.appendChild(opt);
                });
            }

            renderReport(data);
            msg(`Loaded ${data.symbols.length} symbol(s)`, false);
        } catch (e) {
            msg('Error: ' + e.message, true);
            document.getElementById('reportContainer').innerHTML = '';
        }
    }

    function renderReport(data) {
        const container = document.getElementById('reportContainer');
        if (!data.symbols || data.symbols.length === 0) {
            container.innerHTML = '<div class="loading">No positions found.</div>';
            return;
        }

        let html = '';
        for (const sym of data.symbols) {
            const netCls = sym.netTotal > 0 ? 'positive' : sym.netTotal < 0 ? 'negative' : '';
            html += `<div class="symbol-section">`;
            html += `<div class="symbol-header">
                <span>${sym.symbol}</span>
                <span class="net-label">NET: <span class="${netCls}">${fmt(sym.netTotal)}</span></span>
            </div>`;

            // BUY section
            if (sym.buyClients.length > 0) {
                html += `<div class="side-header buy">BUY (${sym.buyClients.length} clients)</div>`;
                html += renderTable(sym.buyClients, sym.buyTotal, true);
            }

            // SELL section
            if (sym.sellClients.length > 0) {
                html += `<div class="side-header sell">SELL (${sym.sellClients.length} clients)</div>`;
                html += renderTable(sym.sellClients, sym.sellTotal, false);
            }

            html += `<div class="net-row">
                <span>NET TOTAL</span>
                <span class="${netCls}">${fmt(sym.netTotal)} lots</span>
            </div>`;
            html += `</div>`;
        }
        container.innerHTML = html;
    }

    function renderTable(clients, total, isBuy) {
        const volCls = isBuy ? 'positive' : 'negative';
        let html = `<div class="table-wrap"><table>
            <thead><tr>
                <th>Login</th><th>Name</th><th style="text-align:right">Volume</th>
                <th>Real Limit</th><th>MT5 Limit</th>
                <th>Equity</th><th>Credit</th><th>Balance</th>
                <th>Free</th><th>Margin</th><th>M.LVL</th>
            </tr></thead><tbody>`;

        for (const c of clients) {
            const overLimit = c.realLimit > 0 && Math.abs(c.volume) > c.realLimit;
            html += `<tr class="${overLimit ? 'over-limit' : ''}">
                <td>${c.login}</td>
                <td>${escHtml(c.name)}</td>
                <td class="${volCls}" style="font-weight:700">${fmt(c.volume)}</td>
                <td class="${c.realLimit > 0 && Math.abs(c.volume) > c.realLimit ? 'negative' : 'muted'}" style="${c.realLimit > 0 && Math.abs(c.volume) > c.realLimit ? 'font-weight:700' : ''}">${c.realLimit > 0 ? c.realLimit.toFixed(2) : '-'}</td>
                <td class="muted">${c.mt5Limit ? fmt(c.mt5Limit) : 'Unlimited'}</td>
                <td>${colorVal(c.equity)}</td>
                <td>${fmt(c.credit)}</td>
                <td>${colorVal(c.balance)}</td>
                <td>${colorVal(c.marginFree)}</td>
                <td>${fmt(c.margin)}</td>
                <td>${marginLevelFmt(c.marginLevel)}</td>
            </tr>`;
        }

        // Total row
        html += `<tr class="total-row">
            <td colspan="2" style="text-align:right; font-weight:700;">TOTAL</td>
            <td class="${volCls}" style="font-weight:700">${fmt(total)}</td>
            <td colspan="8"></td>
        </tr>`;

        html += `</tbody></table></div>`;
        return html;
    }

    function escHtml(s) {
        if (!s) return '';
        return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // Load on page init
    loadReport();
</script>
</body>
</html>
