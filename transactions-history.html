<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>SLC - Transactions History</title>
    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/dist/ag-grid-community.min.js"></script>
    <style>
body { padding: 0; }
h1 { color: var(--blue); margin-bottom: 8px; }
h2 { font-size: 15px; color: var(--fg-muted); margin: 0 0 8px; text-transform: uppercase; letter-spacing: 0.5px; }

.page-header { display: flex; align-items: center; gap: 16px; margin-bottom: 12px; flex-wrap: wrap; }
.page-header h1 { margin-bottom: 0; }
.report-date { font-size: 13px; color: var(--fg-muted); padding: 4px 10px; background: var(--bg3); border-radius: 4px; }

.controls-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.controls-row label { font-size: 13px; color: var(--fg-muted); }
.controls-row input[type="date"], .controls-row input[type="text"] {
    background: var(--bg3); border: 1px solid var(--line); color: var(--fg);
    padding: 5px 8px; border-radius: 4px; font-size: 13px;
}
.controls-row input[type="date"] { width: 130px; }
.controls-row input[type="text"] { width: 240px; }
.controls-row input:focus { outline: none; border-color: var(--blue); }

button { background: var(--blue); color: var(--surface); border: none; padding: 7px 16px; cursor: pointer; border-radius: 4px; font-size: 13px; font-weight: bold; }
button:hover { background: #89b4fa; }

.section { margin-bottom: 20px; }

.summary-row { display: flex; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
.summary-card {
    background: var(--surface); border: 1px solid var(--line); border-radius: 6px;
    padding: 10px 14px; min-width: 120px; flex: 1;
}
.summary-card .label { font-size: 11px; color: var(--fg-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.summary-card .value { font-size: 15px; font-weight: bold; }
.positive { color: var(--pos); }
.negative { color: var(--rose); }
.neutral { color: var(--fg-muted); }

.badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; display: inline-block; }
.badge-deposit  { background: #1a3a2a; color: var(--pos); }
.badge-withdrawal { background: #3a1a1a; color: var(--rose); }
.badge-credit   { background: #2e4057; color: var(--blue); }
.badge-credit-out { background: #3a1a1a; color: var(--rose); }
.badge-bonus    { background: #3b2e1a; color: var(--amber); }
.badge-transfer-in  { background: #1a3040; color: #2ac3de; }
.badge-transfer-out { background: #3a2a1a; color: var(--amber); }
.badge-commission { background: #2a2040; color: #bb9af7; }
.badge-charge   { background: #3a1a1a; color: var(--rose); }
.badge-other    { background: var(--bg3); color: var(--fg-muted); }

.error-bar { display: none; font-size: 13px; color: var(--rose); padding: 6px 10px; background: #3a1a1a; border-radius: 4px; margin-bottom: 8px; }
.error-bar.show { display: block; }
    </style>
    <link rel="stylesheet" href="/shared/theme.css">
    <script src="/shared/nav.js"></script>
    <script src="/shared/grid.js"></script>
</head>
<body>
<div class="page">
    <div class="page-header">
        <h1>Transactions History</h1>
        <span id="reportDate" class="report-date">--</span>
    </div>

    <div class="controls-row">
        <label for="fromDate">From:</label>
        <input type="date" id="fromDate">
        <label for="toDate">To:</label>
        <input type="date" id="toDate">
        <label for="loginsInput">Login(s):</label>
        <input type="text" id="loginsInput" placeholder="optional: 100547, 100548">
        <button onclick="loadData()">Search</button>
        <button onclick="loadData()">Refresh</button>
    </div>

    <div id="errorBar" class="error-bar"></div>

    <div class="section">
        <h2>Client Transactions</h2>
        <div id="clientSummary" class="summary-row"></div>
        <div id="grid-clients" class="ag-theme-alpine-dark" style="height:340px;width:100%"></div>
    </div>

    <div class="section">
        <h2>LP Transactions</h2>
        <div id="lpSummary" class="summary-row"></div>
        <div id="grid-lps" class="ag-theme-alpine-dark" style="height:340px;width:100%"></div>
    </div>
</div>

<script>
    const API = '';

    let clientGridApi = null;
    let lpGridApi = null;

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function getBadgeClass(type) {
        if (!type) return 'badge-other';
        const t = type.toLowerCase();
        if (t === 'deposit') return 'badge-deposit';
        if (t === 'withdrawal') return 'badge-withdrawal';
        if (t === 'credit out') return 'badge-credit-out';
        if (t === 'credit') return 'badge-credit';
        if (t === 'bonus') return 'badge-bonus';
        if (t === 'transfer in') return 'badge-transfer-in';
        if (t === 'transfer out') return 'badge-transfer-out';
        if (t.includes('commission') || t.includes('agent')) return 'badge-commission';
        if (t === 'charge' || t === 'tax') return 'badge-charge';
        return 'badge-other';
    }

    function badgeRenderer(p) {
        if (!p.value) return '';
        return `<span class="badge ${getBadgeClass(p.value)}">${escapeHtml(p.value)}</span>`;
    }

    function amountStyle(p) {
        if (p.value == null) return {};
        return { color: p.value >= 0 ? 'var(--pos)' : 'var(--rose)', fontWeight: 'bold' };
    }

    function amountFormatter(p) {
        if (p.value == null) return '-';
        const sign = p.value >= 0 ? '+' : '';
        return sign + p.value.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    const clientColDefs = [
        { headerName: 'Time', field: 'timeString', minWidth: 140, maxWidth: 170 },
        { headerName: 'Type', field: 'type', minWidth: 110, cellRenderer: badgeRenderer },
        { headerName: 'Login', field: 'login', minWidth: 80, maxWidth: 100 },
        { headerName: 'Name', field: 'name', minWidth: 130 },
        { headerName: 'Amount', field: 'amount', type: 'numericColumn', minWidth: 110, valueFormatter: amountFormatter, cellStyle: amountStyle },
        { headerName: 'Comment', field: 'comment', minWidth: 140, flex: 2 },
    ];

    const lpColDefs = [
        { headerName: 'Time', field: 'timeString', minWidth: 140, maxWidth: 170 },
        { headerName: 'Type', field: 'type', minWidth: 110, cellRenderer: badgeRenderer },
        { headerName: 'LP', field: 'lpName', minWidth: 120 },
        { headerName: 'Source', field: 'source', minWidth: 90, maxWidth: 120 },
        { headerName: 'Login', field: 'login', minWidth: 80, maxWidth: 100 },
        { headerName: 'Amount', field: 'amount', type: 'numericColumn', minWidth: 110, valueFormatter: amountFormatter, cellStyle: amountStyle },
        { headerName: 'Comment', field: 'comment', minWidth: 140, flex: 2 },
    ];

    function formatSummaryAmount(val) {
        if (val == null) return '-';
        const sign = val >= 0 ? '+' : '';
        return sign + val.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function amountClass(val) {
        if (val > 0) return 'positive';
        if (val < 0) return 'negative';
        return 'neutral';
    }

    function renderSummary(containerId, summary) {
        const el = document.getElementById(containerId);
        const cards = [
            { label: 'Deposits',    value: summary.deposits,    cls: amountClass(summary.deposits) },
            { label: 'Withdrawals', value: summary.withdrawals, cls: amountClass(summary.withdrawals) },
            { label: 'Credit In',   value: summary.creditIn,    cls: amountClass(summary.creditIn) },
            { label: 'Credit Out',  value: summary.creditOut,   cls: amountClass(summary.creditOut) },
            { label: 'Net',         value: summary.net,         cls: amountClass(summary.net) },
        ];
        el.innerHTML = cards.map(c =>
            `<div class="summary-card">
                <div class="label">${c.label}</div>
                <div class="value ${c.cls}">${c.raw ? c.value : formatSummaryAmount(c.value)}</div>
            </div>`
        ).join('');
    }

    function showError(msg) {
        const bar = document.getElementById('errorBar');
        bar.textContent = msg;
        bar.classList.add('show');
    }

    function clearError() {
        const bar = document.getElementById('errorBar');
        bar.classList.remove('show');
        bar.textContent = '';
    }

    async function loadData() {
        const from = document.getElementById('fromDate').value;
        const to = document.getElementById('toDate').value;
        const loginsRaw = document.getElementById('loginsInput').value;

        const parts = loginsRaw.split(',').map(s => s.trim()).filter(s => s.length > 0);
        let loginParam = '';
        if (parts.length === 1) {
            loginParam = `&login=${encodeURIComponent(parts[0])}`;
        } else if (parts.length >= 2) {
            loginParam = `&logins=${encodeURIComponent(parts.join(','))}`;
        }

        const url = `${API}/Transactions/history?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}${loginParam}`;

        try {
            const resp = await fetch(url, { cache: 'no-store' });
            if (!resp.ok) {
                const text = await resp.text();
                showError(`Error ${resp.status}: ${text}`);
                return;
            }
            clearError();
            const data = await resp.json();

            document.getElementById('reportDate').textContent = data.date || '--';

            renderSummary('clientSummary', data.clients.summary);
            clientGridApi.setGridOption('rowData', data.clients.transactions || []);

            renderSummary('lpSummary', data.lps.summary);
            lpGridApi.setGridOption('rowData', data.lps.transactions || []);
        } catch (e) {
            showError(`Failed to load: ${e.message}`);
        }
    }

    document.addEventListener('DOMContentLoaded', function () {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('fromDate').value = today;
        document.getElementById('toDate').value = today;

        ['fromDate', 'toDate', 'loginsInput'].forEach(id => {
            document.getElementById(id).addEventListener('keydown', function (e) {
                if (e.key === 'Enter') loadData();
            });
        });

        clientGridApi = SLC.createGrid(document.getElementById('grid-clients'), {
            columnDefs: clientColDefs,
            rowData: [],
            overlayNoRowsTemplate: '<span style="color:var(--fg-muted)">No transactions found</span>',
        });

        lpGridApi = SLC.createGrid(document.getElementById('grid-lps'), {
            columnDefs: lpColDefs,
            rowData: [],
            overlayNoRowsTemplate: '<span style="color:var(--fg-muted)">No transactions found</span>',
        });

        loadData();
    });
</script>
</body>
</html>
