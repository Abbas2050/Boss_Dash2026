<!DOCTYPE html>
<html>
<head>
    <title>Equity Overview</title>
    <style>
body { padding: 0; }
.header { display: flex; align-items: center; gap: 16px; margin-bottom: 8px; }
        .header h1 { color: var(--fg); font-weight: 600; }
        .toolbar button {
            background: var(--surface); border: 1px solid var(--line); color: var(--blue); padding: 4px 10px;
            border-radius: 4px; cursor: pointer; font-size: 12px;
        }
        .toolbar button:hover { background: var(--bg3); border-color: var(--blue); }
        .last-update { font-size: 11px; color: var(--fg-muted); margin-left: auto; }

        .val-pos { color: var(--pos); }
        .val-neg { color: var(--rose); }
        .val-zero { color: var(--fg-muted); }
        .loading { text-align: center; padding: 40px; color: var(--fg-muted); font-size: 14px; }

        /* Equity cards */
        .equity-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 8px;
        }
        .equity-card {
            border: 1px solid var(--line); border-radius: 6px; background: var(--surface); padding: 6px 8px;
        }
        .equity-card .card-title {
            font-size: 13px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.5px; margin-bottom: 12px; padding-bottom: 8px;
            border-bottom: 1px solid var(--line);
        }
        .equity-card.client-card .card-title { color: var(--blue); }
        .equity-card.lp-card .card-title { color: var(--amber); }

        .equity-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 6px 0; font-size: 13px;
        }
        .equity-row .label { color: #888; }
        .equity-row .value { font-weight: 700; font-size: 15px; }
        .equity-row.net { border-top: 1px solid var(--line); margin-top: 4px; padding-top: 10px; }
        .equity-row.net .label { color: var(--fg); font-weight: 600; }
        .equity-row.net .value { font-size: 14px; }

        /* Difference banner */
        .diff-banner {
            border: 1px solid var(--line); border-radius: 6px; background: var(--surface);
            padding: 6px 8px; text-align: center; margin-bottom: 8px;
        }
        .diff-banner .label {
            font-size: 11px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.5px; color: var(--purple); margin-bottom: 6px;
        }
        .diff-banner .value { font-size: 14px; font-weight: 700; }

        /* Collapsible sections */
        .collapsible-header {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--surface); border: 1px solid var(--line); border-radius: 6px;
            padding: 10px 16px; cursor: pointer; margin-bottom: 0; margin-top: 0;
            user-select: none; transition: background 0.15s;
        }
        .collapsible-header:hover { background: var(--bg3); }
        .collapsible-header h2 { font-size: 14px; color: var(--fg); font-weight: 600; }
        .collapsible-header .toggle-icon {
            color: var(--blue); font-size: 13px; font-weight: 700;
            transition: transform 0.2s;
        }
        .collapsible-header.open .toggle-icon { transform: rotate(90deg); }
        .collapsible-header .badge { font-size: 11px; color: var(--fg-muted); margin-left: 8px; }
        .collapsible-body {
            display: none; border: 1px solid var(--line); border-top: none;
            border-radius: 0 0 6px 6px; overflow: hidden; margin-bottom: 16px;
        }
        .collapsible-body.open { display: block; }
        .collapsible-header.open { border-radius: 6px 6px 0 0; }

        .filter-bar {
            display: flex; align-items: center; gap: 8px; margin-left: auto;
        }
        .filter-bar select, .filter-bar input {
            background: var(--bg3); border: 1px solid #414868; color: var(--fg);
            padding: 5px 10px; border-radius: 4px; font-size: 12px;
        }
        .filter-bar input { width: 180px; }
        .filter-bar input::placeholder { color: var(--fg-muted); }
    </style>
    <link rel="stylesheet" href="/shared/theme.css">
    <script src="/shared/nav.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/dist/ag-grid-community.min.js"></script>
    <script src="/shared/grid.js"></script>
</head>
<body>
<div class="page">
        <div class="header">
            <h1>Equity Overview</h1>
            <div class="toolbar">
                <button onclick="fetchData()">Refresh</button>
            </div>
            <span class="last-update" id="lastUpdate"></span>
        </div>

        <div id="mainContent">
            <div class="loading">Loading equity data...</div>
        </div>
    </div>

<script>
    function fmtDollar(v) {
        if (v === 0) return '<span class="val-zero">$0.00</span>';
        const cls = v > 0 ? 'val-pos' : 'val-neg';
        const f = Math.abs(v).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        return `<span class="${cls}">${v < 0 ? '-' : ''}$${f}</span>`;
    }

    function fmtVal(v) {
        const f = Math.abs(v).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        return `${v < 0 ? '-' : ''}$${f}`;
    }

    function colorClass(v) { return v > 0 ? 'val-pos' : v < 0 ? 'val-neg' : 'val-zero'; }

    function dollarStyle(p) {
        const v = p.value;
        if (v == null) return { color: 'var(--fg-muted)' };
        if (v > 0) return { color: 'var(--pos)' };
        if (v < 0) return { color: 'var(--rose)' };
        return { color: 'var(--fg-muted)' };
    }

    function fmtDollarCell(p) {
        if (p.value == null || p.value === '') return '';
        const v = Number(p.value);
        const f = Math.abs(v).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        return `${v < 0 ? '-' : ''}$${f}`;
    }

    function fmtPctCell(p) {
        if (p.value == null || p.value === '' || p.value === 0) return '';
        return p.value.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + '%';
    }

    function pctStyle(p) {
        const v = p.value;
        if (v == null || v === 0) return { color: 'var(--fg-muted)' };
        return { color: v >= 100 ? 'var(--pos)' : 'var(--rose)' };
    }

    const detailColumnDefs = [
        { headerName: 'Name', field: 'name', minWidth: 120, cellRenderer: p => p.value || '<span style="color:#565f89">-</span>' },
        { headerName: 'Login', field: 'login', minWidth: 80, cellStyle: { color: '#c0caf5', fontWeight: '600' } },
        {
            headerName: 'Source', field: 'source', minWidth: 80,
            cellStyle: p => ({ color: p.value === 'Bonus' ? '#e0af68' : '#7aa2f7', fontSize: '11px', fontWeight: '600' })
        },
        { headerName: 'Equity', field: 'equity', type: 'numericColumn', minWidth: 100, valueFormatter: fmtDollarCell, cellStyle: dollarStyle },
        { headerName: 'WD Equity', field: 'withdrawableEquity', type: 'numericColumn', minWidth: 100, valueFormatter: fmtDollarCell, cellStyle: dollarStyle },
        { headerName: 'Credit', field: 'credit', type: 'numericColumn', minWidth: 90, valueFormatter: fmtDollarCell, cellStyle: dollarStyle },
        { headerName: 'Balance', field: 'balance', type: 'numericColumn', minWidth: 100, valueFormatter: fmtDollarCell, cellStyle: dollarStyle },
        { headerName: 'Margin', field: 'margin', type: 'numericColumn', minWidth: 90, valueFormatter: fmtDollarCell, cellStyle: dollarStyle },
        { headerName: 'Free Margin', field: 'freeMargin', type: 'numericColumn', minWidth: 100, valueFormatter: fmtDollarCell, cellStyle: dollarStyle },
        { headerName: 'Margin Level %', field: 'marginLevel', type: 'numericColumn', minWidth: 100, valueFormatter: fmtPctCell, cellStyle: pctStyle },
    ];

    // State
    let allClientItems = [];
    let allLpItems = [];
    let clientGridApi = null;
    let lpGridApi = null;
    let nameCache = {};
    let namesLoaded = false;

    function renderDashboard(data) {
        const c = data.clients;
        const l = data.lps;

        let html = '';

        // Equity summary cards
        html += '<div class="equity-grid">';

        // Client card
        html += `<div class="equity-card client-card">
            <div class="card-title">Client Withdrawable Equity</div>
            <div class="equity-row"><span class="label">Live Clients</span><span class="value ${colorClass(c.liveWithdrawableEquity)}">${fmtVal(c.liveWithdrawableEquity)}</span></div>
            <div class="equity-row"><span class="label">Bonus Clients</span><span class="value ${colorClass(c.bonusWithdrawableEquity)}">${fmtVal(c.bonusWithdrawableEquity)}</span></div>
            <div class="equity-row net"><span class="label">Net Client WD Equity</span><span class="value ${colorClass(c.netWithdrawableEquity)}">${fmtVal(c.netWithdrawableEquity)}</span></div>
        </div>`;

        // LP card
        html += `<div class="equity-card lp-card">
            <div class="card-title">LP Withdrawable Equity</div>
            <div class="equity-row"><span class="label">Live LPs</span><span class="value ${colorClass(l.liveWithdrawableEquity)}">${fmtVal(l.liveWithdrawableEquity)}</span></div>
            <div class="equity-row"><span class="label">Bonus LP</span><span class="value ${colorClass(l.bonusWithdrawableEquity)}">${fmtVal(l.bonusWithdrawableEquity)}</span></div>
            <div class="equity-row net"><span class="label">Net LP WD Equity</span><span class="value ${colorClass(l.netWithdrawableEquity)}">${fmtVal(l.netWithdrawableEquity)}</span></div>
        </div>`;

        html += '</div>';

        // Difference banner
        html += `<div class="diff-banner">
            <div class="label">Net LP - Net Client Withdrawable Equity</div>
            <div class="value ${colorClass(data.netDifference)}">${fmtVal(data.netDifference)}</div>
        </div>`;

        document.getElementById('mainContent').innerHTML = html;

        // Client details
        allClientItems = c.items || [];
        allLpItems = l.items || [];

        renderCollapsibleSection('client', allClientItems, true);
        renderCollapsibleSection('lp', allLpItems, false);
    }

    function renderCollapsibleSection(type, items, isClient) {
        const containerId = type + 'Section';
        let container = document.getElementById(containerId);

        // First render - create the DOM structure once
        if (!container) {
            container = document.createElement('div');
            container.id = containerId;
            document.querySelector('.page').appendChild(container);

            const title = isClient ? 'Client Details' : 'LP Details';
            container.innerHTML = `
                <div class="collapsible-header" onclick="toggleSection('${type}')">
                    <div style="display:flex;align-items:center;">
                        <h2>${title}</h2>
                        <span class="badge" id="${type}Badge"></span>
                    </div>
                    <div class="filter-bar">
                        <select id="${type}SourceFilter" onclick="event.stopPropagation()" onchange="filterItems('${type}')">
                            <option value="">All Sources</option>
                            <option value="Live">Live</option>
                            <option value="Bonus">Bonus</option>
                        </select>
                        <input type="text" id="${type}Search" placeholder="Search by login..." onclick="event.stopPropagation()" oninput="filterItems('${type}')">
                    </div>
                    <span class="toggle-icon">&#9654;</span>
                </div>
                <div class="collapsible-body" id="${type}Body">
                    <div id="${type}Grid" class="ag-theme-alpine-dark" style="height:400px;width:100%"></div>
                </div>
            `;

            // Init grid
            const gridEl = document.getElementById(type + 'Grid');
            const api = SLC.createGrid(gridEl, {
                columnDefs: detailColumnDefs,
                rowData: [],
                overlayNoRowsTemplate: '<span style="color:var(--fg-muted)">No data</span>',
            });

            if (isClient) clientGridApi = api;
            else lpGridApi = api;
        }

        // Update badge count
        document.getElementById(type + 'Badge').textContent = `(${items.length} accounts)`;

        // Re-apply active filters to new data
        filterItems(type);
    }

    async function resolveNames() {
        try {
            const resp = await fetch('/EquityOverview/names');
            if (resp.ok) {
                nameCache = await resp.json();
            }
        } catch (e) { /* optional */ }
    }

    function toggleSection(type) {
        const container = document.getElementById(type + 'Section');
        const header = container.querySelector('.collapsible-header');
        const body = container.querySelector('.collapsible-body');
        header.classList.toggle('open');
        body.classList.toggle('open');
    }

    function filterItems(type) {
        const src = document.getElementById(type + 'SourceFilter').value;
        const q = document.getElementById(type + 'Search').value.trim();
        const isClient = type === 'client';
        let items = isClient ? allClientItems : allLpItems;

        if (src) items = items.filter(i => i.source === src);
        if (q) {
            const ql = q.toLowerCase();
            items = items.filter(i => {
                const name = i.name || nameCache[String(i.login)] || '';
                return String(i.login).includes(q) || name.toLowerCase().includes(ql);
            });
        }

        // Enrich names from cache
        const enriched = items.map(i => ({
            ...i,
            name: i.name || nameCache[String(i.login)] || ''
        }));

        const api = isClient ? clientGridApi : lpGridApi;
        if (api) {
            api.setGridOption('rowData', enriched);
        }
    }

    async function fetchData() {
        try {
            const resp = await fetch('/EquityOverview/dashboard');
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            const data = await resp.json();
            renderDashboard(data);
            document.getElementById('lastUpdate').textContent = 'Updated: ' + new Date().toLocaleTimeString();

            // Resolve names once on first successful load
            if (!namesLoaded) {
                namesLoaded = true;
                resolveNames().then(() => {
                    filterItems('client');
                    filterItems('lp');
                });
            }
        } catch (e) {
            console.error('Failed to fetch equity overview:', e);
            document.getElementById('mainContent').innerHTML =
                '<div class="loading">Failed to load data. <button onclick="fetchData()">Retry</button></div>';
        }
    }

    fetchData();
    setInterval(fetchData, 5000);
</script>
</body>
</html>
