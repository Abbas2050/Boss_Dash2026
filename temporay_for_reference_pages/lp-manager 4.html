<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>SLC - LP Account Manager</title>
    <style>
body { padding: 0; }
h1 { color: var(--blue); margin-bottom: 8px; }
        h2 { font-size: 15px; color: var(--pos); margin: 8px 0 8px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .panel { background: var(--surface); border: 1px solid var(--line); border-radius: 6px; padding: 8px; }

        .form-row { display: flex; gap: 10px; margin-bottom: 6px; align-items: center; }
        .form-row label { min-width: 100px; font-size: 13px; color: #888; }
        .form-row input, .form-row select { background: var(--bg3); border: 1px solid #414868; color: var(--fg); padding: 4px 8px; border-radius: 4px; font-size: 13px; flex: 1; }
        .terminal-fields { display: none; border-top: 1px solid var(--line); padding-top: 10px; margin-top: 10px; }
        .terminal-fields.show { display: block; }
        .terminal-hint { font-size: 11px; color: var(--fg-muted); margin-bottom: 8px; }

        button { background: var(--blue); color: var(--surface); border: none; padding: 7px 16px; cursor: pointer; border-radius: 4px; font-size: 13px; font-weight: bold; }
        button:hover { background: #89b4fa; }
        button.danger { background: var(--rose); }
        button.danger:hover { background: #ff9e9e; }
        button.secondary { background: #414868; color: var(--fg); }
        button.secondary:hover { background: var(--fg-muted); }
        button.icon-btn { padding: 2px 8px; font-size: 11px; line-height: 1; border: 1px solid transparent; border-radius: 3px; cursor: pointer; font-weight: bold; }
        button.edit-btn { background: var(--amber); color: var(--surface); }
        button.edit-btn:hover { background: #f0c878; }
        button.deactivate-btn { background: transparent; color: var(--rose); border-color: var(--rose); }
        button.deactivate-btn:hover { background: var(--rose); color: var(--surface); }
        button.activate-btn { background: transparent; color: var(--pos); border-color: var(--pos); }
        button.activate-btn:hover { background: var(--pos); color: var(--surface); }
        button.delete-btn { background: var(--rose); color: var(--surface); }
        button.delete-btn:hover { background: #ff9e9e; }

        .badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; display: inline-block; }
        .badge-manager { background: #2e4057; color: var(--blue); }
        .badge-terminal { background: #3b2e1a; color: var(--amber); }
        .badge-bonus { background: #2e1a3b; color: var(--purple); }
        .badge-api { background: #1a2e3b; color: var(--blue); }
        .badge-active { background: #1a3a2a; color: var(--pos); }
        .badge-inactive { background: #3a1a1a; color: var(--rose); }

        .positive { color: var(--pos); }
        .negative { color: var(--rose); }
        .neutral { color: var(--amber); }

        .status-bar { display: flex; gap: 15px; margin-bottom: 8px; font-size: 12px; }
        .status-item { padding: 4px 10px; background: var(--bg3); border-radius: 4px; }

        #msg { margin-top: 8px; font-size: 13px; min-height: 20px; }
        .msg-ok { color: var(--pos); }
        .msg-err { color: var(--rose); }

        .full-width { grid-column: 1 / -1; }
        #accountsGrid { height: 500px; width: 100%; }
        #accountsGrid .ag-cell { display: flex; align-items: center; }
        #accountsGrid .actions { display: flex; gap: 5px; align-items: center; }

        #bulkToolbar { display: none; gap: 10px; align-items: center; padding: 6px 10px; margin-bottom: 6px; background: var(--bg3); border: 1px solid var(--line); border-radius: 4px; font-size: 13px; flex-wrap: wrap; }
        #bulkToolbar button { padding: 4px 12px; font-size: 12px; }

        .worker-status { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; padding: 6px 10px; background: var(--bg3); border-radius: 4px; }
        .worker-dot { width: 8px; height: 8px; border-radius: 50%; }
        .worker-dot.ok { background: var(--pos); }
        .worker-dot.stale { background: var(--rose); }
        .worker-dot.unknown { background: var(--fg-muted); }

        .panel.collapsed #addLpBody { display: none; }
        #addLpHeader { cursor: pointer; user-select: none; }

        /* Edit Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center; }
        .modal-overlay.show { display: flex; }
        .modal { background: var(--surface); border: 1px solid #414868; border-radius: 8px; padding: 8px; width: 500px; max-width: 90vw; max-height: 90vh; overflow-y: auto; }
        .modal h2 { color: var(--blue); margin: 0 0 15px; font-size: 16px; }
        .modal .form-row label { min-width: 110px; }
        .modal-actions { display: flex; gap: 10px; margin-top: 15px; justify-content: flex-end; }
        #editMsg { margin-top: 8px; font-size: 13px; min-height: 20px; }
    </style>
    <link rel="stylesheet" href="/shared/theme.css">
    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/dist/ag-grid-community.min.js"></script>
    <script src="/shared/grid.js"></script>
    <script src="/shared/nav.js"></script>
</head>
<body>
<!-- Edit Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <h2>Edit LP Account <span id="editTitle" style="color:#565f89;font-size:13px"></span></h2>
            <input type="hidden" id="editId" />
            <div class="form-row">
                <label>LP Name</label>
                <input id="editLpName" />
            </div>
            <div class="form-row">
                <label>MT5 Login</label>
                <input id="editMt5Login" disabled style="opacity:0.5" />
            </div>
            <div class="form-row">
                <label>Group Pattern</label>
                <input id="editGroupPattern" placeholder="optional" />
            </div>
            <div class="form-row">
                <label>Description</label>
                <input id="editDescription" placeholder="optional" />
            </div>
            <div class="form-row">
                <label>Active</label>
                <select id="editIsActive">
                    <option value="true">Active</option>
                    <option value="false">Inactive</option>
                </select>
            </div>
            <div class="form-row">
                <label>Coverage Login</label>
                <input id="editCoverageAccountLogin" type="number" placeholder="optional - coverage mirror login" />
            </div>
            <div class="form-row">
                <label>Exclude Equity</label>
                <select id="editExcludeFromEquity">
                    <option value="false">No</option>
                    <option value="true">Yes - hide from equity calculations</option>
                </select>
            </div>
            <div class="form-row">
                <label>Exclude Positions</label>
                <select id="editExcludeFromPositions">
                    <option value="false">No</option>
                    <option value="true">Yes - hide from coverage/positions</option>
                </select>
            </div>
            <div class="form-row">
                <label>Bonus Routing</label>
                <select id="editIsBonus">
                    <option value="false">Normal — show in live dashboards</option>
                    <option value="true">Bonus — show in bonus dashboards</option>
                </select>
            </div>
            <div class="form-row">
                <label>Exclude History</label>
                <select id="editExcludeFromHistory">
                    <option value="false">No</option>
                    <option value="true">Yes - hide from history aggregate</option>
                </select>
            </div>
            <div class="form-row">
                <label>Exclude Deal Matching</label>
                <select id="editExcludeFromDealMatching">
                    <option value="false">No</option>
                    <option value="true">Yes - drop from deal matching report</option>
                </select>
            </div>

            <div id="editTerminalFields" class="terminal-fields">
                <div class="terminal-hint">Terminal connection settings</div>
                <div class="form-row">
                    <label>Terminal Path</label>
                    <input id="editTerminalPath" placeholder="C:/Program Files/MT5/terminal64.exe" />
                </div>
                <div class="form-row">
                    <label>MT5 Server</label>
                    <input id="editMt5Server" placeholder="e.g. BrokerName-Live" />
                </div>
                <div class="form-row">
                    <label>MT5 Password</label>
                    <input id="editMt5Password" type="password" placeholder="Leave blank to keep current" />
                </div>
            </div>

            <div id="editMsg"></div>
            <div class="modal-actions">
                <button class="secondary" onclick="closeEditModal()">Cancel</button>
                <button onclick="saveEdit()">Save Changes</button>
            </div>
        </div>
    </div>

    <div class="page">
        <h1>LP Account Manager</h1>

        <div class="status-bar">
            <div class="status-item">LP Accounts: <strong id="totalAccounts">-</strong></div>
            <div class="status-item">Manager: <strong id="managerCount">-</strong></div>
            <div class="status-item">Terminal: <strong id="terminalCount">-</strong></div>
            <div class="status-item">API: <strong id="apiCount">-</strong></div>
            <div class="status-item"><button class="secondary" onclick="refreshAll()">Refresh All</button></div>
        </div>

        <div class="panel" style="margin-bottom: 6px;">
            <h2 style="margin: 0 0 8px;">MT5 Manager Status</h2>
            <div id="managerStatusGrid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 8px;">
                <div class="neutral" style="font-size: 12px;">Loading...</div>
            </div>
        </div>

        <div class="grid">
            <!-- Add LP Account -->
            <div class="panel collapsed" id="addLpPanel">
                <h2 id="addLpHeader" onclick="toggleAddLpPanel()"><span id="addLpChevron">▶</span> Add LP Account</h2>
                <div id="addLpBody">
                    <div class="form-row">
                        <label>LP Name</label>
                        <input id="lpName" placeholder="e.g. ATFX, FXCM" />
                    </div>
                    <div class="form-row">
                        <label>MT5 Login</label>
                        <input id="mt5Login" type="number" placeholder="e.g. 102001" />
                    </div>
                    <div class="form-row">
                        <label>Source</label>
                        <select id="source" onchange="toggleTerminalFields()">
                            <option value="Manager">Manager</option>
                            <option value="Terminal">Terminal</option>
                            <option value="Api">API</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <label>Group Pattern</label>
                        <input id="groupPattern" placeholder="optional" />
                    </div>
                    <div class="form-row">
                        <label>Description</label>
                        <input id="description" placeholder="optional" />
                    </div>
                    <div class="form-row">
                        <label>Coverage Login</label>
                        <input id="coverageAccountLogin" type="number" placeholder="optional - coverage mirror login to exclude from equity" />
                    </div>
                    <div class="form-row">
                        <label>Exclude Equity</label>
                        <select id="excludeFromEquity">
                            <option value="false">No</option>
                            <option value="true">Yes - hide from equity calculations</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <label>Exclude Positions</label>
                        <select id="excludeFromPositions">
                            <option value="false">No</option>
                            <option value="true">Yes - hide from coverage/positions</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <label>Bonus Routing</label>
                        <select id="isBonus">
                            <option value="false">Normal — show in live dashboards</option>
                            <option value="true">Bonus — show in bonus dashboards</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <label>Exclude History</label>
                        <select id="excludeFromHistory">
                            <option value="false">No</option>
                            <option value="true">Yes - hide from history aggregate</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <label>Exclude Deal Matching</label>
                        <select id="excludeFromDealMatching">
                            <option value="false">No</option>
                            <option value="true">Yes - drop from deal matching report</option>
                        </select>
                    </div>

                    <div id="terminalFields" class="terminal-fields">
                        <div class="terminal-hint">Terminal source requires MT5 terminal installed on this machine</div>
                        <div class="form-row">
                            <label>Terminal Path</label>
                            <input id="mt5TerminalPath" placeholder="C:/Program Files/MT5/terminal64.exe" />
                        </div>
                        <div class="form-row">
                            <label>MT5 Server</label>
                            <input id="mt5Server" placeholder="e.g. BrokerName-Live" />
                        </div>
                        <div class="form-row">
                            <label>MT5 Password</label>
                            <input id="mt5Password" type="password" placeholder="Account password" />
                        </div>
                    </div>

                    <div class="form-row">
                        <label></label>
                        <button onclick="addAccount()">Add LP Account</button>
                    </div>
                    <div id="msg"></div>
                </div>
            </div>

            <!-- Terminal Worker Status -->
            <div class="panel">
                <h2>Terminal Feed Status</h2>
                <div id="terminalStatus" class="ag-theme-alpine-dark" style="height: 220px; width: 100%;"></div>
            </div>

            <!-- LP Accounts Grid -->
            <div class="panel full-width">
                <h2>LP Accounts</h2>
                <div id="bulkToolbar">
                    <span><strong id="bulkCount">0</strong> selected</span>
                    <button onclick="bulkUpdate({ isActive: true }, 'Activated')">Activate</button>
                    <button class="danger" onclick="bulkConfirmUpdate({ isActive: false }, 'Deactivate', 'Deactivated')">Deactivate</button>
                    <button onclick="bulkUpdate({ excludeFromEquity: true }, 'Excluded from equity')">Exclude Equity</button>
                    <button onclick="bulkUpdate({ excludeFromEquity: false }, 'Included in equity')">Include Equity</button>
                    <button onclick="bulkUpdate({ excludeFromPositions: true }, 'Excluded from positions')">Exclude Positions</button>
                    <button onclick="bulkUpdate({ excludeFromPositions: false }, 'Included in positions')">Include Positions</button>
                    <button onclick="bulkUpdate({ isBonus: true }, 'Routed to bonus dashboards')">Route to Bonus</button>
                    <button onclick="bulkUpdate({ isBonus: false }, 'Routed to live dashboards')">Route to Normal</button>
                    <button class="danger" onclick="bulkDelete(false)">Remove</button>
                    <button class="secondary" onclick="clearSelection()">Cancel</button>
                </div>
                <div id="accountsGrid" class="ag-theme-alpine-dark"></div>
            </div>

        </div>
    </div>

    <script>
        const API = '';
        let allAccounts = [];
        let lpGrid = null;
        let terminalGrid = null;

        function sourceName(val) {
            return typeof val === 'string' ? val : ['Manager','Terminal','Api'][val] || 'Manager';
        }

        // ── ag-Grid column definitions ──
        const lpColumnDefs = [
            { checkboxSelection: true, headerCheckboxSelection: true, width: 45, pinned: 'left', filter: false, sortable: false, resizable: false },
            { headerName: 'ID', field: 'id', maxWidth: 70, flex: 0 },
            { headerName: 'LP Name', field: 'lpName', cellStyle: { fontWeight: 'bold' } },
            { headerName: 'MT5 Login', field: 'mt5Login', maxWidth: 120 },
            {
                headerName: 'Source', field: 'source', maxWidth: 140,
                cellRenderer: p => {
                    const a = p.data || {};
                    const src = sourceName(p.value);
                    const cls = src === 'Terminal' ? 'badge-terminal' : src === 'Api' ? 'badge-api' : 'badge-manager';
                    let dot = '';
                    if (src === 'Api' && a.isConnected !== null && a.isConnected !== undefined) {
                        const dotCls = a.isConnected ? 'ok' : 'stale';
                        const lastTxt = a.lastDataReceived ? new Date(a.lastDataReceived).toLocaleTimeString() : 'never';
                        dot = ` <span class="worker-dot ${dotCls}" title="Last data: ${lastTxt}" style="display:inline-block;vertical-align:middle;margin-left:4px;"></span>`;
                    }
                    return `<span class="badge ${cls}">${src}</span>${dot}`;
                }
            },
            {
                headerName: 'Coverage Login', field: 'coverageAccountLogin', maxWidth: 140,
                valueFormatter: p => p.value || '-'
            },
            {
                headerName: 'Equity', field: 'excludeFromEquity', maxWidth: 110,
                cellRenderer: p => p.value
                    ? '<span class="badge badge-inactive">Excluded</span>'
                    : '<span class="badge badge-active">Included</span>'
            },
            {
                headerName: 'Positions', field: 'excludeFromPositions', maxWidth: 110,
                cellRenderer: p => p.value
                    ? '<span class="badge badge-inactive">Excluded</span>'
                    : '<span class="badge badge-active">Included</span>'
            },
            {
                headerName: 'Routing', field: 'isBonus', maxWidth: 110,
                cellRenderer: p => p.value
                    ? '<span class="badge badge-bonus">Bonus</span>'
                    : '<span class="badge badge-manager">Normal</span>'
            },
            {
                headerName: 'History', field: 'excludeFromHistory', maxWidth: 110,
                cellRenderer: p => p.value
                    ? '<span class="badge badge-inactive">Excluded</span>'
                    : '<span class="badge badge-active">Included</span>'
            },
            {
                headerName: 'Deal Matching', field: 'excludeFromDealMatching', maxWidth: 130,
                cellRenderer: p => p.value
                    ? '<span class="badge badge-inactive">Excluded</span>'
                    : '<span class="badge badge-active">Included</span>'
            },
            {
                headerName: 'Status', field: 'isActive', maxWidth: 100,
                cellRenderer: p => p.value
                    ? '<span class="badge badge-active">Active</span>'
                    : '<span class="badge badge-inactive">Inactive</span>'
            },
            {
                headerName: 'Actions', field: 'id', sortable: false, filter: false, minWidth: 100, maxWidth: 110, flex: 0,
                cellRenderer: p => {
                    const a = p.data;
                    const div = document.createElement('div');
                    div.className = 'actions';

                    const editBtn = document.createElement('button');
                    editBtn.className = 'icon-btn edit-btn';
                    editBtn.textContent = '✎';
                    editBtn.title = 'Edit';
                    editBtn.addEventListener('click', () => openEditModal(a.id));
                    div.appendChild(editBtn);

                    const toggleBtn = document.createElement('button');
                    toggleBtn.className = a.isActive ? 'icon-btn deactivate-btn' : 'icon-btn activate-btn';
                    toggleBtn.textContent = '⏻';
                    toggleBtn.title = a.isActive ? 'Deactivate' : 'Activate';
                    toggleBtn.addEventListener('click', () => a.isActive ? deactivate(a.id) : activate(a.id));
                    div.appendChild(toggleBtn);

                    const delBtn = document.createElement('button');
                    delBtn.className = 'icon-btn delete-btn';
                    delBtn.textContent = '✕';
                    delBtn.title = 'Remove';
                    delBtn.addEventListener('click', () => removeAccount(a.id, a.lpName));
                    div.appendChild(delBtn);

                    return div;
                }
            }
        ];

        function toggleAddLpPanel() {
            const panel = document.getElementById('addLpPanel');
            const chevron = document.getElementById('addLpChevron');
            const collapsed = panel.classList.toggle('collapsed');
            chevron.textContent = collapsed ? '▶' : '▼';
        }

        const terminalColumnDefs = [
            {
                headerName: 'Status', field: 'status', minWidth: 90, flex: 1,
                cellRenderer: p => {
                    const dotClass = p.value === 'STALE' ? 'stale' : 'ok';
                    const span = document.createElement('span');
                    span.style.display = 'flex';
                    span.style.alignItems = 'center';
                    span.style.gap = '6px';
                    const dot = document.createElement('span');
                    dot.className = `worker-dot ${dotClass}`;
                    const txt = document.createTextNode(p.value);
                    span.appendChild(dot);
                    span.appendChild(txt);
                    return span;
                }
            },
            { headerName: 'LP Name', field: 'lpName', minWidth: 120, flex: 2, cellStyle: { fontWeight: 'bold' } },
            { headerName: 'Login', field: 'login', minWidth: 100, flex: 1 },
            {
                headerName: 'Last Push', field: 'lastPush', minWidth: 130, flex: 2,
                sort: 'desc',
                valueFormatter: p => p.value ? new Date(p.value).toLocaleTimeString() : 'Never'
            }
        ];

        // ── Init grid ──
        document.addEventListener('DOMContentLoaded', () => {
            lpGrid = SLC.createGrid(document.getElementById('accountsGrid'), {
                columnDefs: lpColumnDefs,
                rowData: [],
                rowSelection: 'multiple',
                getRowId: p => String(p.data.id),
                onSelectionChanged: onSelectionChanged,
            });

            terminalGrid = SLC.createGrid(document.getElementById('terminalStatus'), {
                columnDefs: terminalColumnDefs,
                rowData: [],
                overlayNoRowsTemplate: 'No terminal feeds active',
            });
        });

        function msg(text, ok) {
            const el = document.getElementById('msg');
            el.textContent = text;
            el.className = ok ? 'msg-ok' : 'msg-err';
            setTimeout(() => el.textContent = '', 4000);
        }

        function editMsg(text, ok) {
            const el = document.getElementById('editMsg');
            el.textContent = text;
            el.className = ok ? 'msg-ok' : 'msg-err';
            setTimeout(() => el.textContent = '', 4000);
        }

        function toggleTerminalFields() {
            const source = document.getElementById('source').value;
            const fields = document.getElementById('terminalFields');
            fields.className = source === 'Terminal' ? 'terminal-fields show' : 'terminal-fields';
        }

        // ---- Edit Modal ----
        function openEditModal(id) {
            const a = allAccounts.find(x => x.id === id);
            if (!a) return;

            const isTerminal = a.source === 'Terminal' || a.source === 1;

            document.getElementById('editId').value = a.id;
            document.getElementById('editTitle').textContent = `#${a.id}`;
            document.getElementById('editLpName').value = a.lpName || '';
            document.getElementById('editMt5Login').value = a.mt5Login || '';
            document.getElementById('editGroupPattern').value = a.groupPattern || '';
            document.getElementById('editDescription').value = a.description || '';
            document.getElementById('editIsActive').value = a.isActive ? 'true' : 'false';
            document.getElementById('editTerminalPath').value = a.mt5TerminalPath || '';
            document.getElementById('editMt5Server').value = a.mt5Server || '';
            document.getElementById('editMt5Password').value = '';
            document.getElementById('editCoverageAccountLogin').value = a.coverageAccountLogin || '';
            document.getElementById('editExcludeFromEquity').value = a.excludeFromEquity ? 'true' : 'false';
            document.getElementById('editExcludeFromPositions').value = a.excludeFromPositions ? 'true' : 'false';
            document.getElementById('editIsBonus').value = a.isBonus ? 'true' : 'false';
            document.getElementById('editExcludeFromHistory').value = a.excludeFromHistory ? 'true' : 'false';
            document.getElementById('editExcludeFromDealMatching').value = a.excludeFromDealMatching ? 'true' : 'false';

            document.getElementById('editTerminalFields').className =
                isTerminal ? 'terminal-fields show' : 'terminal-fields';

            document.getElementById('editMsg').textContent = '';
            document.getElementById('editModal').className = 'modal-overlay show';
        }

        function closeEditModal() {
            document.getElementById('editModal').className = 'modal-overlay';
        }

        async function saveEdit() {
            const id = document.getElementById('editId').value;
            const coverageVal = document.getElementById('editCoverageAccountLogin').value.trim();
            const body = {
                lpName: document.getElementById('editLpName').value.trim() || null,
                groupPattern: document.getElementById('editGroupPattern').value.trim() || null,
                description: document.getElementById('editDescription').value.trim() || null,
                isActive: document.getElementById('editIsActive').value === 'true',
                coverageAccountLogin: coverageVal ? parseInt(coverageVal) : null,
                excludeFromEquity: document.getElementById('editExcludeFromEquity').value === 'true',
                excludeFromPositions: document.getElementById('editExcludeFromPositions').value === 'true',
                isBonus: document.getElementById('editIsBonus').value === 'true',
                excludeFromHistory: document.getElementById('editExcludeFromHistory').value === 'true',
                excludeFromDealMatching: document.getElementById('editExcludeFromDealMatching').value === 'true',
            };

            const path = document.getElementById('editTerminalPath').value.trim();
            const server = document.getElementById('editMt5Server').value.trim();
            const password = document.getElementById('editMt5Password').value.trim();

            if (path) body.mt5TerminalPath = path;
            if (server) body.mt5Server = server;
            if (password) body.mt5Password = password;

            try {
                const resp = await fetch(`${API}/api/LpAccount/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                if (resp.ok) {
                    closeEditModal();
                    msg('Account updated successfully', true);
                    loadAccounts();
                } else {
                    const text = await resp.text();
                    editMsg(`Error: ${text}`, false);
                }
            } catch (e) {
                editMsg(`Failed: ${e.message}`, false);
            }
        }

        // Close modal on overlay click or Escape
        document.getElementById('editModal').addEventListener('click', e => {
            if (e.target === document.getElementById('editModal')) closeEditModal();
        });
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeEditModal();
        });

        // ---- Accounts ----
        async function loadAccounts() {
            try {
                const resp = await fetch(`${API}/api/LpAccount?all=true`);
                allAccounts = await resp.json();

                let managerCount = 0, terminalCount = 0, apiCount = 0;

                allAccounts.forEach(a => {
                    const srcStr = sourceName(a.source);
                    if (srcStr === 'Terminal') terminalCount++;
                    else if (srcStr === 'Api') apiCount++;
                    else managerCount++;
                });

                document.getElementById('totalAccounts').textContent = allAccounts.length;
                document.getElementById('managerCount').textContent = managerCount;
                document.getElementById('terminalCount').textContent = terminalCount;
                document.getElementById('apiCount').textContent = apiCount;

                if (lpGrid) lpGrid.setGridOption('rowData', allAccounts);
            } catch (e) {
                console.error('Failed to load accounts:', e);
            }
        }

        async function addAccount() {
            const lpName = document.getElementById('lpName').value.trim();
            const mt5Login = document.getElementById('mt5Login').value.trim();
            const source = document.getElementById('source').value;
            const groupPattern = document.getElementById('groupPattern').value.trim();
            const description = document.getElementById('description').value.trim();

            if (!lpName || !mt5Login) {
                msg('LP Name and MT5 Login are required', false);
                return;
            }

            const coverageVal = document.getElementById('coverageAccountLogin').value.trim();
            const body = {
                lpName,
                mt5Login: parseInt(mt5Login),
                source,
                groupPattern: groupPattern || null,
                description: description || null,
                coverageAccountLogin: coverageVal ? parseInt(coverageVal) : null,
                excludeFromEquity: document.getElementById('excludeFromEquity').value === 'true',
                excludeFromPositions: document.getElementById('excludeFromPositions').value === 'true',
                isBonus: document.getElementById('isBonus').value === 'true',
                excludeFromHistory: document.getElementById('excludeFromHistory').value === 'true',
                excludeFromDealMatching: document.getElementById('excludeFromDealMatching').value === 'true',
            };

            if (source === 'Terminal') {
                const path = document.getElementById('mt5TerminalPath').value.trim();
                const server = document.getElementById('mt5Server').value.trim();
                const password = document.getElementById('mt5Password').value.trim();

                if (!path || !server || !password) {
                    msg('Terminal source requires Path, Server, and Password', false);
                    return;
                }

                body.mt5TerminalPath = path;
                body.mt5Server = server;
                body.mt5Password = password;
            }

            try {
                const resp = await fetch(`${API}/api/LpAccount`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                if (resp.ok) {
                    const account = await resp.json();
                    msg(`Added ${account.lpName} (login ${account.mt5Login})`, true);
                    document.getElementById('lpName').value = '';
                    document.getElementById('mt5Login').value = '';
                    document.getElementById('groupPattern').value = '';
                    document.getElementById('description').value = '';
                    document.getElementById('mt5TerminalPath').value = '';
                    document.getElementById('mt5Server').value = '';
                    document.getElementById('mt5Password').value = '';
                    document.getElementById('coverageAccountLogin').value = '';
                    document.getElementById('isBonus').value = 'false';
                    document.getElementById('excludeFromHistory').value = 'false';
                    document.getElementById('excludeFromDealMatching').value = 'false';
                    loadAccounts();
                } else {
                    const text = await resp.text();
                    msg(`Error: ${text}`, false);
                }
            } catch (e) {
                msg(`Failed: ${e.message}`, false);
            }
        }

        async function deactivate(id) {
            if (!confirm('Deactivate this LP account? It will stop tracking positions.')) return;
            try {
                const resp = await fetch(`${API}/api/LpAccount/${id}`, { method: 'DELETE' });
                if (resp.ok) {
                    msg('Account deactivated', true);
                    loadAccounts();
                } else {
                    msg('Failed to deactivate', false);
                }
            } catch (e) {
                msg(`Failed: ${e.message}`, false);
            }
        }

        async function removeAccount(id, name) {
            if (!confirm(`Permanently remove LP account "${name}" (#${id})? This cannot be undone.`)) return;
            try {
                const resp = await fetch(`${API}/api/LpAccount/${id}?permanent=true`, { method: 'DELETE' });
                if (resp.ok) {
                    msg(`Account "${name}" permanently removed`, true);
                    loadAccounts();
                } else {
                    msg('Failed to remove', false);
                }
            } catch (e) {
                msg(`Failed: ${e.message}`, false);
            }
        }

        async function activate(id) {
            try {
                const resp = await fetch(`${API}/api/LpAccount/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ isActive: true })
                });
                if (resp.ok) {
                    msg('Account activated', true);
                    loadAccounts();
                } else {
                    msg('Failed to activate', false);
                }
            } catch (e) {
                msg(`Failed: ${e.message}`, false);
            }
        }

        async function loadTerminalStatus() {
            if (!terminalGrid) return;
            try {
                const resp = await fetch(`${API}/api/TerminalPosition/status`);
                const data = await resp.json();
                const lpNameByLogin = new Map(allAccounts.map(a => [a.mt5Login, a.lpName]));
                const rows = (data || []).map(s => ({
                    status: s.isStale ? 'STALE' : 'OK',
                    lpName: lpNameByLogin.get(s.login) || '—',
                    login: s.login,
                    lastPush: s.lastPush || null,
                }));
                terminalGrid.setGridOption('rowData', rows);
            } catch (e) {
                console.error('Failed to load terminal status:', e);
            }
        }

        function onSelectionChanged() {
            const count = lpGrid ? lpGrid.getSelectedRows().length : 0;
            const toolbar = document.getElementById('bulkToolbar');
            toolbar.style.display = count > 0 ? 'flex' : 'none';
            document.getElementById('bulkCount').textContent = count;
        }

        function clearSelection() {
            if (lpGrid) lpGrid.deselectAll();
        }

        async function bulkUpdate(patch, msgPrefix) {
            const rows = lpGrid ? lpGrid.getSelectedRows() : [];
            if (rows.length === 0) return;
            const ids = rows.map(r => r.id);
            try {
                const resp = await fetch(`${API}/api/lpaccount/bulk-update`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ids, patch })
                });
                if (resp.ok) {
                    clearSelection();
                    refreshAll();
                    msg(`${msgPrefix} ${ids.length} LP account${ids.length !== 1 ? 's' : ''}`, true);
                } else {
                    msg(`Error: ${resp.statusText}`, false);
                }
            } catch (e) {
                msg(`Failed: ${e.message}`, false);
            }
        }

        async function bulkConfirmUpdate(patch, confirmVerb, msgPrefix) {
            const rows = lpGrid ? lpGrid.getSelectedRows() : [];
            if (rows.length === 0) return;
            if (!confirm(`${confirmVerb} ${rows.length} LP account${rows.length !== 1 ? 's' : ''}?`)) return;
            await bulkUpdate(patch, msgPrefix);
        }

        async function bulkDelete(permanent) {
            const rows = lpGrid ? lpGrid.getSelectedRows() : [];
            if (rows.length === 0) return;
            if (!confirm(`Remove ${rows.length} LP account${rows.length !== 1 ? 's' : ''}? (soft delete)`)) return;
            const ids = rows.map(r => r.id);
            try {
                const resp = await fetch(`${API}/api/lpaccount/bulk-delete`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ids, permanent })
                });
                if (resp.ok) {
                    clearSelection();
                    refreshAll();
                    msg(`Removed ${ids.length} LP account${ids.length !== 1 ? 's' : ''}`, true);
                } else {
                    msg(`Error: ${resp.statusText}`, false);
                }
            } catch (e) {
                msg(`Failed: ${e.message}`, false);
            }
        }

        async function loadManagerStatus() {
            const grid = document.getElementById('managerStatusGrid');
            try {
                const r = await fetch('/api/ManagerStatus');
                if (!r.ok) throw new Error(await r.text());
                const list = await r.json();
                grid.innerHTML = list.map(m => {
                    let badge;
                    if (!m.configured) badge = '<span class="badge badge-inactive">Not Configured</span>';
                    else if (m.connected) badge = '<span class="badge badge-active">Connected</span>';
                    else badge = '<span class="badge badge-inactive">Disconnected</span>';
                    const last = m.lastAttemptUtc ? new Date(m.lastAttemptUtc).toLocaleString() : '—';
                    const err = (m.lastResult && m.lastResult !== 'MT_RET_OK')
                        ? `<div class="negative" style="font-size:11px; margin-top:2px;">${m.lastResult}</div>` : '';
                    const loginTxt = m.login > 0 ? `#${m.login}` : '—';
                    return `<div style="border:1px solid var(--line); border-radius:4px; padding:8px; background:var(--bg3);">
                        <div style="font-weight:bold;">${m.name} <span style="color:var(--fg-muted); font-weight:normal;">${loginTxt}</span></div>
                        <div style="margin:4px 0;">${badge}</div>
                        <div style="font-size:11px; color:var(--fg-muted);">Last attempt: ${last}</div>
                        ${err}
                    </div>`;
                }).join('');
            } catch (e) {
                grid.innerHTML = `<div class="negative">Error: ${e.message}</div>`;
            }
        }

        function refreshAll() {
            loadAccounts();
            loadTerminalStatus();
            loadManagerStatus();
        }

        refreshAll();
        setInterval(loadTerminalStatus, 5000);
    </script>
</body>
</html>
