<!DOCTYPE html>
<html>
<head>
    <title>SLC - LP Margin Alerts</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <style>
        body { padding: 0; }
        .page { max-width: 1400px; margin: 0 auto; padding: 20px; }
        h1 { color: var(--blue); margin-bottom: 6px; }
        .subtitle { color: var(--fg-muted); font-size: 13px; margin-bottom: 8px; }

        .status-bar { display: flex; gap: 15px; margin-bottom: 8px; font-size: 12px; align-items: center; }
        .ws-status { padding: 4px 10px; border-radius: 4px; font-weight: bold; font-size: 12px; }
        .ws-connected { background: #1a3a2a; color: var(--pos); }
        .ws-disconnected { background: #3a1a1a; color: var(--rose); }
        .ws-reconnecting { background: #3a2a1a; color: #e0ac69; }

        .threshold-display { padding: 4px 10px; border-radius: 4px; background: #2e4057; color: var(--blue); font-weight: bold; }
        .last-tick { padding: 4px 10px; border-radius: 4px; background: #1a3a2a; color: var(--pos); font-size: 12px; }
        .last-tick.stale { background: #3a1a1a; color: var(--rose); }
        .alert-count { font-size: 12px; color: var(--fg-muted); margin-left: auto; }

        .panel { background: var(--surface); border: 1px solid var(--line); border-radius: 6px; padding: 8px; margin-bottom: 8px; }
        h2 { color: var(--pos); margin-bottom: 8px; }

        .form-inline { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .form-inline input { background: var(--bg3); border: 1px solid #414868; color: var(--fg); padding: 4px 8px; border-radius: 4px; font-size: 13px; }
        .form-inline input[type="number"] { width: 140px; }
        .form-inline .hint { font-size: 11px; color: var(--fg-muted); }
        .form-inline .save-msg { font-size: 12px; }
        .save-msg.ok { color: var(--pos); }
        .save-msg.err { color: var(--rose); }

        button { background: var(--blue); color: var(--surface); border: none; padding: 6px 14px; cursor: pointer; border-radius: 4px; font-size: 13px; font-weight: bold; }
        button:hover { background: #89b4fa; }

        .badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; display: inline-block; }
        .badge-manager { background: #2e4057; color: var(--blue); }
        .badge-terminal { background: #1a3a3a; color: #7adada; }
        .badge-api { background: #3a2a4a; color: #c4a7e7; }
        .badge-coverage { background: #3a2a1a; color: #e0ac69; }

        #alertGrid { height: 540px; width: 100%; }
        #alertGrid .ag-cell { display: flex; align-items: center; }

        .neg { color: var(--rose); font-weight: bold; }
    </style>
    <link rel="stylesheet" href="/shared/theme.css">
    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/dist/ag-grid-community.min.js"></script>
    <script src="/shared/grid.js"></script>
    <script src="/shared/nav.js"></script>
</head>
<body>
<div class="page">
    <h1>LP Margin Alerts</h1>
    <p class="subtitle">Real-time alerts for LP accounts whose margin level falls at or below the configured threshold. Poll interval is configurable.</p>

    <div class="status-bar">
        <span class="ws-status ws-disconnected" id="wsStatus">Disconnected</span>
        <span class="threshold-display" id="thresholdDisplay">Threshold: --</span>
        <span class="threshold-display" id="intervalDisplay">Interval: --</span>
        <span class="last-tick stale" id="lastTick">Waiting for first tick...</span>
        <span class="alert-count" id="alertCount">0 active alerts</span>
    </div>

    <!-- Alert Settings -->
    <div class="panel">
        <h2>Alert Settings</h2>
        <div class="form-inline">
            <label for="thresholdInput">Margin Level &le;</label>
            <input type="number" id="thresholdInput" min="0.01" max="10000" step="0.1" placeholder="100.0">
            <span class="hint">%</span>

            <label for="intervalInput" style="margin-left: 20px;">Tick every</label>
            <input type="number" id="intervalInput" min="5" max="600" step="1" placeholder="30">
            <span class="hint">seconds (5-600)</span>

            <button onclick="saveSettings()">Save</button>
            <span class="save-msg" id="saveMsg"></span>
        </div>
    </div>

    <!-- Live Alerts Feed -->
    <div class="panel">
        <h2>Live Alerts</h2>
        <div id="alertGrid" class="ag-theme-alpine-dark"></div>
    </div>
</div>

<script>
    let alertGridApi = null;
    let currentThreshold = null;
    let currentIntervalSec = 30;
    let lastTickAt = null;
    // Stale threshold is 3 * tick interval. Recomputed when interval changes.
    let staleMs = 3 * currentIntervalSec * 1000;

    const fmtNum = (v, dp = 2) => (v == null || isNaN(v)) ? '' : Number(v).toFixed(dp);
    const fmtTime = v => {
        if (!v) return '';
        const d = new Date(v);
        return isNaN(d.getTime()) ? '' : d.toLocaleTimeString();
    };

    const sourceBadge = src => {
        const cls = {
            'Manager':  'badge badge-manager',
            'Terminal': 'badge badge-terminal',
            'Api':      'badge badge-api',
            'Coverage': 'badge badge-coverage'
        }[src] || 'badge badge-manager';
        return `<span class="${cls}">${src || 'Manager'}</span>`;
    };

    const alertCols = [
        { headerName: 'Source', field: 'source', maxWidth: 110, cellRenderer: p => sourceBadge(p.value) },
        { headerName: 'LP Name', field: 'lpName', minWidth: 160 },
        { headerName: 'Login', field: 'login', maxWidth: 130, cellStyle: { fontWeight: 'bold' } },
        {
            headerName: 'Margin Level %', field: 'marginLevel', maxWidth: 150,
            valueFormatter: p => fmtNum(p.value, 2),
            cellClass: 'neg'
        },
        { headerName: 'Equity', field: 'equity', valueFormatter: p => fmtNum(p.value) },
        { headerName: 'Balance', field: 'balance', valueFormatter: p => fmtNum(p.value) },
        { headerName: 'Credit', field: 'credit', valueFormatter: p => fmtNum(p.value) },
        { headerName: 'Margin', field: 'margin', valueFormatter: p => fmtNum(p.value) },
        { headerName: 'Free Margin', field: 'freeMargin', valueFormatter: p => fmtNum(p.value) },
        { headerName: 'Last Update', field: 'timestampUtc', maxWidth: 140, valueFormatter: p => fmtTime(p.value) },
    ];

    document.addEventListener('DOMContentLoaded', () => {
        alertGridApi = SLC.createGrid(document.getElementById('alertGrid'), {
            columnDefs: alertCols,
            rowData: [],
            getRowId: p => `${p.data.source}:${p.data.login}`,
            overlayNoRowsTemplate: 'No accounts currently below the margin threshold.',
        });

        loadSettings();
        startConnection();
    });

    // -- Threshold settings --

    async function loadSettings() {
        try {
            const resp = await fetch('/api/AlertSettings');
            if (!resp.ok) throw new Error(await resp.text());
            const data = await resp.json();
            applySettings(data);
        } catch (e) {
            console.error('Failed to load settings:', e);
            document.getElementById('thresholdDisplay').textContent = 'Threshold: error';
            document.getElementById('intervalDisplay').textContent = 'Interval: error';
        }
    }

    function applySettings(data) {
        currentThreshold = data.marginAlertThreshold;
        currentIntervalSec = data.marginAlertIntervalSeconds;
        staleMs = 3 * currentIntervalSec * 1000;
        document.getElementById('thresholdInput').value = currentThreshold;
        document.getElementById('intervalInput').value = currentIntervalSec;
        document.getElementById('thresholdDisplay').textContent = `Threshold: ${fmtNum(currentThreshold, 2)}%`;
        document.getElementById('intervalDisplay').textContent = `Interval: ${currentIntervalSec}s`;
    }

    async function saveSettings() {
        const msg = document.getElementById('saveMsg');
        msg.className = 'save-msg';
        msg.textContent = '';

        const t = parseFloat(document.getElementById('thresholdInput').value);
        if (!t || t <= 0 || t > 10000) {
            msg.className = 'save-msg err';
            msg.textContent = 'Threshold must be between 0.01 and 10000';
            return;
        }
        const i = parseInt(document.getElementById('intervalInput').value, 10);
        if (!Number.isInteger(i) || i < 5 || i > 600) {
            msg.className = 'save-msg err';
            msg.textContent = 'Interval must be an integer between 5 and 600 seconds';
            return;
        }
        try {
            const resp = await fetch('/api/AlertSettings', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ marginAlertThreshold: t, marginAlertIntervalSeconds: i })
            });
            if (!resp.ok) {
                msg.className = 'save-msg err';
                msg.textContent = 'Error: ' + await resp.text();
                return;
            }
            const data = await resp.json();
            applySettings(data);
            msg.className = 'save-msg ok';
            msg.textContent = 'Saved';
            setTimeout(() => { msg.textContent = ''; }, 2500);
        } catch (e) {
            msg.className = 'save-msg err';
            msg.textContent = 'Failed: ' + e.message;
        }
    }

    // -- Live alerts (SignalR) --

    function onAlerts(alerts) {
        const rows = Array.isArray(alerts) ? alerts : [];
        document.getElementById('alertCount').textContent =
            `${rows.length} active alert${rows.length !== 1 ? 's' : ''}`;
        if (alertGridApi) alertGridApi.setGridOption('rowData', rows);
        lastTickAt = Date.now();
        refreshLastTickLabel();
    }

    function refreshLastTickLabel() {
        const el = document.getElementById('lastTick');
        if (lastTickAt == null) {
            el.className = 'last-tick stale';
            el.textContent = 'Waiting for first tick...';
            return;
        }
        const ageMs = Date.now() - lastTickAt;
        const ageSec = Math.floor(ageMs / 1000);
        const stale = ageMs > staleMs;
        el.className = stale ? 'last-tick stale' : 'last-tick';
        el.textContent = stale
            ? `Stale - no tick for ${ageSec}s`
            : `Last tick: ${ageSec}s ago`;
    }

    setInterval(refreshLastTickLabel, 1000);

    // -- SignalR --

    const connection = new signalR.HubConnectionBuilder()
        .withUrl('/ws/dashboard')
        .withAutomaticReconnect([0, 1000, 2000, 5000, 10000])
        .build();

    connection.on('LpMarginAlerts', onAlerts);

    function setWs(state) {
        const el = document.getElementById('wsStatus');
        if (state === 'connected') {
            el.className = 'ws-status ws-connected';
            el.textContent = 'Connected';
        } else if (state === 'reconnecting') {
            el.className = 'ws-status ws-reconnecting';
            el.textContent = 'Reconnecting...';
        } else {
            el.className = 'ws-status ws-disconnected';
            el.textContent = 'Disconnected';
        }
    }

    connection.onclose(() => setWs('disconnected'));
    connection.onreconnecting(() => setWs('reconnecting'));
    connection.onreconnected(() => setWs('connected'));

    async function startConnection() {
        try {
            await connection.start();
            setWs('connected');
        } catch (e) {
            console.error('SignalR error:', e);
            setWs('disconnected');
            setTimeout(startConnection, 3000);
        }
    }
</script>
</body>
</html>
