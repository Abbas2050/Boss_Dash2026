<!DOCTYPE html>
<html>
<head>
    <title>LP Metrics</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Consolas, monospace; background: #0d0d14; color: #c8c8d0; padding: 0; }

        .nav { display: flex; align-items: center; gap: 0; background: #1a1b26; border-bottom: 1px solid #292e42; padding: 0 20px; }
        .nav-brand { color: #7aa2f7; font-weight: 700; font-size: 15px; padding: 12px 16px 12px 0; text-decoration: none; border-right: 1px solid #292e42; margin-right: 4px; }
        .nav a { color: #565f89; text-decoration: none; padding: 12px 14px; font-size: 13px; font-weight: 500; transition: color 0.15s, background 0.15s; }
        .nav a:hover { color: #c0caf5; background: #24283b; }
        .nav a.active { color: #7aa2f7; border-bottom: 2px solid #7aa2f7; }

        .content { padding: 16px; }
        .header { display: flex; align-items: center; gap: 16px; margin-bottom: 12px; }
        .header h1 { font-size: 16px; color: #c0caf5; font-weight: 600; }
        .toolbar button {
            background: #1a1b26; border: 1px solid #292e42; color: #7aa2f7; padding: 4px 10px;
            border-radius: 4px; cursor: pointer; font-size: 12px;
        }
        .toolbar button:hover { background: #1f2335; border-color: #7aa2f7; }
        .last-update { font-size: 11px; color: #565f89; margin-left: auto; }

        table { border-collapse: collapse; width: 100%; font-size: 13px; }
        thead th {
            background: #13131d; color: #7aa2f7; font-weight: 600; font-size: 11px;
            text-transform: uppercase; letter-spacing: 0.5px;
            padding: 8px 10px; text-align: right; border-bottom: 1px solid #292e42;
            position: sticky; top: 0; z-index: 1;
        }
        thead th:first-child { text-align: left; }
        tbody tr { border-bottom: 1px solid #1a1b26; }
        tbody tr:hover { background: #1a1b2a; }
        tbody td { padding: 6px 10px; text-align: right; white-space: nowrap; }
        tbody td:first-child { text-align: left; color: #c0caf5; font-weight: 600; }

        tfoot td {
            padding: 8px 10px; text-align: right; font-weight: 700;
            border-top: 2px solid #292e42; background: #13131d;
        }
        tfoot td:first-child { text-align: left; color: #c0caf5; }

        .val-pos { color: #9ece6a; }
        .val-neg { color: #f7768e; }
        .val-zero { color: #565f89; }

        .loading { text-align: center; padding: 60px; color: #565f89; font-size: 14px; }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="/" class="nav-brand">SLC Dashboard</a>
        <a href="/">Home</a>
        <a href="/risk-exposure.html">Risk Exposure</a>
        <a href="/coverage.html">Coverage</a>
        <a href="/metrics.html" class="active">Metrics</a>
        <a href="/lp-manager.html">LP Manager</a>
        <a href="/lp-info.html">LP Info</a>
        <a href="/symbol-mapping.html">Symbol Mapping</a>
        <a href="/transactions.html">Transactions</a>
        <a href="/account-alerts.html">Account Alerts</a>
        <a href="/deal-matching.html">Deal Matching</a>
        <a href="/history.html">History</a>
        <a href="/ws-test.html">WS Test</a>
        <a href="/swagger">Swagger</a>
    </nav>

    <div class="content">
        <div class="header">
            <h1>LP Metrics</h1>
            <div class="toolbar">
                <button onclick="fetchMetrics()">Refresh</button>
            </div>
            <span class="last-update" id="lastUpdate"></span>
        </div>

        <div id="tableContainer">
            <div class="loading">Loading metrics...</div>
        </div>
    </div>

    <script>
        function fmtDollar(v) {
            if (v === 0) return '<span class="val-zero">$0.00</span>';
            const cls = v > 0 ? 'val-pos' : 'val-neg';
            const formatted = Math.abs(v).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            return `<span class="${cls}">${v < 0 ? '-' : ''}$${formatted}</span>`;
        }

        function fmtPct(v) {
            if (v === 0) return '<span class="val-zero">0.00%</span>';
            const cls = v >= 100 ? 'val-pos' : 'val-neg';
            return `<span class="${cls}">${v.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}%</span>`;
        }

        function renderTable(data) {
            if (!data || !data.items || data.items.length === 0) {
                document.getElementById('tableContainer').innerHTML =
                    '<div class="loading">No LP accounts found</div>';
                return;
            }

            let html = '<table><thead><tr>';
            html += '<th>LP</th><th>Equity</th><th>Real Equity</th><th>Credit</th>';
            html += '<th>Balance</th><th>Margin</th><th>Free Margin</th><th>Margin Level %</th>';
            html += '</tr></thead><tbody>';

            data.items.forEach(item => {
                html += '<tr>';
                html += `<td>${item.lp}</td>`;
                html += `<td>${fmtDollar(item.equity)}</td>`;
                html += `<td>${fmtDollar(item.realEquity)}</td>`;
                html += `<td>${fmtDollar(item.credit)}</td>`;
                html += `<td>${fmtDollar(item.balance)}</td>`;
                html += `<td>${fmtDollar(item.margin)}</td>`;
                html += `<td>${fmtDollar(item.freeMargin)}</td>`;
                html += `<td>${fmtPct(item.marginLevel)}</td>`;
                html += '</tr>';
            });

            html += '</tbody><tfoot><tr>';
            html += '<td>TOTAL</td>';
            html += `<td>${fmtDollar(data.totals.equity)}</td>`;
            html += `<td>${fmtDollar(data.totals.realEquity)}</td>`;
            html += `<td>${fmtDollar(data.totals.credit)}</td>`;
            html += `<td>${fmtDollar(data.totals.balance)}</td>`;
            html += `<td>${fmtDollar(data.totals.margin)}</td>`;
            html += `<td>${fmtDollar(data.totals.freeMargin)}</td>`;
            html += '<td></td>';
            html += '</tr></tfoot></table>';

            document.getElementById('tableContainer').innerHTML = html;
            document.getElementById('lastUpdate').textContent = 'Updated: ' + new Date().toLocaleTimeString();
        }

        async function fetchMetrics() {
            try {
                const resp = await fetch('/Metrics/lp');
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                const data = await resp.json();
                renderTable(data);
            } catch (e) {
                console.error('Failed to fetch metrics:', e);
                document.getElementById('tableContainer').innerHTML =
                    '<div class="loading">Failed to load metrics. <button onclick="fetchMetrics()">Retry</button></div>';
            }
        }

        fetchMetrics();
        setInterval(fetchMetrics, 5000);
    </script>
</body>
</html>
